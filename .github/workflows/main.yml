name: Auto Proxy Gen & Scan
on: [push, workflow_dispatch]
jobs:
  scan_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Scanner
        run: python scanner.py
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: alive-proxies
          path: alive.txt
          
